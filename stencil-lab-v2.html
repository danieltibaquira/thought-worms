<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thought Worms — Stencil Lab v2</title>
  <style>
    :root{color-scheme:dark;--bg:#111;--fg:#f4f1ea;--muted:#aaa39a;--line:#38352f;--accent:#d8c59d;--panel:rgba(255,255,255,.045);--paper:#f4f1ea;--ink:#111;--gold:#b9973e}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:clamp(.75rem,2vw,1.25rem)}
    main{max-width:1580px;margin:0 auto;display:grid;gap:1rem}.nav{display:flex;gap:1rem;flex-wrap:wrap;color:var(--muted)}a{color:var(--accent);text-decoration:none}h1{font-family:Georgia,serif;font-weight:500;color:var(--accent);letter-spacing:-.06em;line-height:.95;margin:.4rem 0;font-size:clamp(2rem,6vw,5.4rem)}
    .grid{display:grid;gap:1rem}.panel{border:1px solid var(--line);border-radius:22px;background:var(--panel);padding:1rem}.controls{display:grid;gap:.8rem;align-content:start}.control{display:grid;gap:.35rem}.control label{color:var(--muted);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase}.control input,.control select,.control textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#151515;color:var(--fg);padding:.75rem;font:inherit}.control textarea{min-height:6rem;resize:vertical;font-family:Georgia,serif;font-size:1.12rem}.actions{display:flex;gap:.55rem;flex-wrap:wrap}button{border:1px solid var(--line);background:#171717;color:var(--fg);border-radius:999px;padding:.68rem .95rem;font:inherit;cursor:pointer}button:hover{border-color:var(--accent)}
    .stage{display:grid;place-items:center;overflow:auto}.stage svg{width:min(100%,760px);height:auto;background:var(--paper);border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.48)}.analysis{font-size:.88rem;color:var(--muted);line-height:1.55;display:grid;gap:.7rem}.analysis b{color:var(--fg)}.bar{height:8px;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#181818}.bar span{display:block;height:100%;background:var(--accent)}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.16rem .5rem;margin:.1rem;color:var(--fg)}
    @media(min-width:1100px){.grid{grid-template-columns:390px 1fr}.stage svg{width:min(100%,930px)}}
  </style>
</head>
<body>
<main>
  <div class="nav"><a href="./">Random worm</a><a href="./artifacts.html">Artifact table</a><a href="./stencil-lab.html">Stencil Lab v1</a><a href="./stencil-lab-v2.html">Stencil Lab v2</a></div>
  <h1>Stencil Lab v2</h1>
  <section class="grid">
    <aside class="panel controls">
      <div class="control"><label for="artifactPick">Artifact</label><select id="artifactPick"></select></div>
      <div class="actions"><button id="presetCanto">Flor y canto</button><button id="presetDepth">Depth</button><button id="presetDawn">Dawn</button></div>
      <div class="control"><label for="phrase">Phrase as artifact</label><textarea id="phrase"></textarea></div>
      <div class="control"><label for="assembly">Meaning assembly</label><select id="assembly"><option value="auto">Auto from artifact</option><option value="botanical">botanical / breath / song</option><option value="water">water / depth / exile</option><option value="cosmic">dawn / fire / sky</option><option value="contemplative">silence / attention / cell</option><option value="urban">Bogotá / mountain / street</option></select></div>
      <div class="control"><label for="format">Use case</label><select id="format"><option value="poster">wheatpaste poster</option><option value="sticker">sticker sheet</option><option value="stencil">vinyl stencil</option></select></div>
      <div class="control"><label for="explode">Disassembly amount</label><input id="explode" type="range" min="0" max="100" value="64"></div>
      <div class="control"><label for="seed">Deterministic seed</label><input id="seed" type="number" min="1" max="9999" value="137"></div>
      <div class="actions"><button id="redraw">Redraw</button><button id="downloadSvg">Download SVG</button><button id="downloadPng">Download PNG</button></div>
      <div class="analysis" id="analysis"></div>
    </aside>
    <section class="panel stage"><svg id="poster" viewBox="0 0 1000 1414" role="img" aria-label="Disassembled thought artifact stencil"></svg></section>
  </section>
</main>
<script src="./extra-worms-001.js?v=20260705b"></script>
<script src="./extra-worms-002.js?v=20260706a"></script>
<script>
const rows=(Array.isArray(window.THOUGHT_WORMS)?window.THOUGHT_WORMS:[]).filter(r=>r&&r.artifact&&r.spanish);
const svg=document.getElementById('poster'), pick=document.getElementById('artifactPick'), phrase=document.getElementById('phrase'), assembly=document.getElementById('assembly'), format=document.getElementById('format'), explode=document.getElementById('explode'), seedEl=document.getElementById('seed'), analysis=document.getElementById('analysis');
const NS='http://www.w3.org/2000/svg', W=1000,H=1414, INK='#111', PAPER='#f4f1ea', GOLD='#b9973e';
function E(n,a={},kids=[]){const e=document.createElementNS(NS,n);for(const[k,v]of Object.entries(a)){if(v!==undefined&&v!==null)e.setAttribute(k,v)}kids.forEach(c=>e.appendChild(c));return e}
function add(e){svg.appendChild(e);return e}function rect(x,y,w,h,fill=INK,rx=0){return add(E('rect',{x,y,width:w,height:h,rx,fill}))}function line(x1,y1,x2,y2,stroke=INK,sw=6,dash=''){return add(E('line',{x1,y1,x2,y2,stroke,'stroke-width':sw,'stroke-linecap':'round','stroke-dasharray':dash}))}function circ(cx,cy,r,fill='none',stroke=INK,sw=6){return add(E('circle',{cx,cy,r,fill,stroke,'stroke-width':sw}))}function path(d,fill='none',stroke=INK,sw=6){return add(E('path',{d,fill,stroke,'stroke-width':sw,'stroke-linecap':'round','stroke-linejoin':'round'}))}function poly(p,fill=INK){return add(E('polygon',{points:p.map(q=>q.join(',')).join(' '),fill}))}function text(x,y,s,a={}){const t=add(E('text',{x,y,...a}));t.textContent=s;return t}
function hash(s){let h=2166136261;for(let i=0;i<String(s).length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}function rng(seed){let t=seed>>>0;return()=>{t+=0x6D2B79F5;let x=Math.imul(t^t>>>15,1|t);x^=x+Math.imul(x^x>>>7,61|x);return((x^x>>>14)>>>0)/4294967296}}
function words(s){return String(s||'').replace(/[“”]/g,'').replace(/[^\p{L}\p{N}\sÁÉÍÓÚÜÑáéíóúüñ]/gu,' ').replace(/\s+/g,' ').trim().toUpperCase().split(' ').filter(Boolean).slice(0,9)}
function linesFromWords(ws){const lines=[];let c='';for(const w of ws){if((c+' '+w).trim().length>14&&c){lines.push(c);c=w}else c=(c+' '+w).trim()}if(c)lines.push(c);return lines.slice(0,5)}
function shortPhrase(row){return (row.spanish||row.english||row.artifact).replace(/;|:/g,'.').split(/[.!?]/)[0].trim()||row.artifact}
function kind(row){const t=[row.category,row.artifact,row.original,row.english,row.spanish].join(' ').toLowerCase();if(assembly.value!=='auto')return assembly.value;if(/flor|flower|tree|frog|pond|haiku|canto|song|reed/.test(t))return'botanical';if(/water|river|depth|sea|agua|río|rio|mar|exile/.test(t))return'water';if(/sun|fire|sky|dawn|luz|cielo|fuego|rigveda|amanezca/.test(t))return'cosmic';if(/silence|stillness|attention|cell|mind|silencio|atención/.test(t))return'contemplative';return'urban'}
function layerLabel(name,y){text(62,y,name,{fill:INK,'font-family':'system-ui','font-size':16,'letter-spacing':3,opacity:.58})}
function frame(rand,amount){rect(0,0,W,H,PAPER);const th=amount>55?18:12;[[58,58,1,1],[942,58,-1,1],[58,1356,1,-1],[942,1356,-1,-1]].forEach(([x,y,sx,sy])=>{rect(x,y,130*sx,th);rect(x,y,th,130*sy);rect(x+35*sx,y+35*sy,80*sx,8);rect(x+35*sx,y+35*sy,8,80*sy)});line(240,70,760,70,INK,8,'28 22');line(240,1344,760,1344,INK,8,'28 22');for(let i=0;i<8;i++){circ(i%2?880:120,210+i*135,10+rand()*10,'none',INK,4);line(i%2?850:150,210+i*135,i%2?760:240,210+i*135+(rand()-.5)*80,INK,3,'10 14')}}
function bridgeCuts(x,y,w,h,rand){const n=Math.max(2,Math.floor(w/115));for(let i=1;i<=n;i++){const bx=x+i*w/(n+1)-10;rect(bx,y-10,20,h+18,PAPER,2);line(bx+10,y-8,bx+10,y+h+8,INK,1,'6 10')}}
function wordPlate(w,i,total,rand,amount){const baseY=430+i*112;const drift=(amount/100)*90;const x=500+(rand()-.5)*drift*(i%2?1.6:1);const y=baseY+(rand()-.5)*drift;const size=Math.max(70,150-Math.max(0,w.length-5)*8);const width=Math.min(820,Math.max(320,w.length*size*.62));rect(x-width/2-28,y-size*.75,width+56,size*.95,INK,12);text(x,y,w,{'text-anchor':'middle','dominant-baseline':'middle','font-family':'Georgia,serif','font-weight':900,'font-size':size,fill:PAPER,'letter-spacing':-2});bridgeCuts(x-width/2-28,y-size*.75,width+56,size*.95,rand);const anchorX=i%2?850:150;line(x+(i%2?width/2:-width/2),y,anchorX,y+(rand()-.5)*50,INK,3,'12 14');circ(anchorX,y+(rand()-.5)*50,12,'none',INK,5);return {x,y,w:width,h:size,chars:w.length}}
function petal(cx,cy,a,s){add(E('ellipse',{cx:cx+Math.cos(a)*46*s,cy:cy+Math.sin(a)*32*s,rx:24*s,ry:72*s,fill:INK,transform:`rotate(${a*180/Math.PI+90} ${cx+Math.cos(a)*46*s} ${cy+Math.sin(a)*32*s})`}))}
function botanical(rand,amount){layerLabel('SOURCE IMAGE: FLOWER / BREATH / SONG',128);for(let i=0;i<7;i++)petal(500,180,i*Math.PI*2/7,.72+rand()*.08);circ(500,180,20,PAPER,INK,7);for(let i=0;i<5;i++)line(470+i*15,190,455+i*22,245,INK,4);for(let s of [-1,1]){for(let i=0;i<3;i++)path(`M${500+s*(210+i*42)} ${540+i*26} C${500+s*(260+i*52)} ${510+i*20} ${500+s*(320+i*52)} ${548+i*30} ${500+s*(360+i*40)} ${520+i*20}`, 'none', INK, 5)}}
function water(rand,amount){layerLabel('SOURCE IMAGE: DEPTH / WATER / CALL',128);for(let i=0;i<5;i++){path(`M${265+i*95} ${190+i%2*22} C${305+i*95} ${150+i%2*22} ${350+i*95} ${230+i%2*22} ${390+i*95} ${190+i%2*22}`,'none',INK,9)}circ(500,205,86,'none',INK,8);line(500,118,500,292,INK,3,'9 12')}
function cosmic(rand,amount){layerLabel('SOURCE IMAGE: DAWN / FIRE / SKY',128);add(E('path',{d:'M380 230 A120 120 0 0 1 620 230 L380 230',fill:GOLD}));for(let i=0;i<13;i++){const a=-Math.PI+i*Math.PI/12;line(500+145*Math.cos(a),230+145*Math.sin(a),500+230*Math.cos(a),230+230*Math.sin(a),INK,9)}circ(500,165,26,INK,INK,5)}
function contemplative(rand,amount){layerLabel('SOURCE IMAGE: CELL / PAUSE / ATTENTION',128);rect(390,110,220,165,INK,16);rect(424,142,152,96,PAPER,8);line(500,142,500,238,INK,7);line(424,190,576,190,INK,7);circ(500,335,18,'none',INK,7);line(500,360,500,430,INK,4,'10 13')}
function urban(rand,amount){layerLabel('CITY BODY: MOUNTAIN / STREET / STICKER RESIDUE',128);poly([[250,260],[365,145],[450,245],[575,130],[760,260]],INK);for(let i=0;i<13;i++)rect(305+i*30,215-rand()*55,18,55+rand()*60,PAPER);line(210,292,790,292,INK,10);for(let i=0;i<12;i++)rect(155+i*70,1120+rand()*70,36,12,INK)}
function cityBase(rand){layerLabel('BOGOTÁ LAYER: WALL, MOUNTAIN, TRAJECTORY',1160);poly([[210,1260],[350,1135],[470,1235],[620,1120],[805,1260]],INK);for(let i=0;i<17;i++)rect(250+i*29,1210-rand()*90,18,88+rand()*45,PAPER);add(E('path',{d:'M210 1282 Q500 1355 790 1282',fill:'none',stroke:GOLD,'stroke-width':20,'stroke-linecap':'round','stroke-dasharray':'80 26'}));line(500,1070,500,1340,INK,3,'10 14');circ(500,1320,30,INK,INK,5)}
function context(kindName,rand,amount){({botanical,water,cosmic,contemplative,urban}[kindName]||urban)(rand,amount);cityBase(rand)}
function residue(rand,amount){const n=8+Math.floor(amount/9);for(let i=0;i<n;i++){const x=80+rand()*840,y=80+rand()*1220;if(rand()<.55){rect(x,y,30+rand()*80,8+rand()*18,INK,2)}else{circ(x,y,3+rand()*9,INK,INK,1)}}}
function meaningChips(row,rand,amount){const chips=[row.category,row.artifact.split('—')[0].trim(),(row.source||row.recommendedEditionSource||'source').split('—')[0].trim()].filter(Boolean).slice(0,3);chips.forEach((c,i)=>{const y=345+i*70;const x=i%2?805:195;rect(x-86,y-20,172,40,INK,20);text(x,y,c.toUpperCase().slice(0,18),{'text-anchor':'middle','dominant-baseline':'middle','font-family':'system-ui','font-size':13,'letter-spacing':2,fill:PAPER});line(x+(i%2?-90:90),y,500,y+60,INK,3,'9 13')})}
function render(){svg.innerHTML='';const row=rows[pick.selectedIndex]||rows[0]||{};const amount=Number(explode.value);const rand=rng(Number(seedEl.value)+hash(row.artifact+phrase.value));const ws=words(phrase.value);const kindName=kind(row);frame(rand,amount);context(kindName,rand,amount);meaningChips(row,rand,amount);layerLabel('CORE: PHRASE DISASSEMBLED INTO CUTTABLE WORD PLATES',365);const plates=ws.length?ws.map((w,i)=>wordPlate(w,i,ws.length,rand,amount)):[];residue(rand,amount);inspect(row,plates,kindName,amount)}
function pct(n){return Math.max(0,Math.min(100,Math.round(n)))}
function inspect(row,plates,kindName,amount){const nodes=svg.querySelectorAll('*').length;const chars=plates.reduce((s,p)=>s+p.chars,0);const longest=Math.max(0,...plates.map(p=>p.chars));const textArea=plates.reduce((s,p)=>s+p.w*p.h,0);const legibility=pct(112-longest*5-plates.length*3+textArea/65000);const cut=pct(104-nodes*.12-longest*2-(format.value==='sticker'?0:6));const concept=pct(42+amount*.32+(kindName!=='urban'?14:8)+Math.min(22,plates.length*3));const read=legibility>72?'street-readable from a few meters':'needs fewer words or larger plates';const cutNote=cut>74?'cut-safe after outlining text':'reduce residue/density before vinyl cutting';analysis.innerHTML=`<div><b>Artifact pulled:</b> ${row.category||'custom'} · ${row.artifact||'custom phrase'}</div><div><b>Assembly:</b> <span class="badge">${kindName}</span><span class="badge">${format.value}</span><span class="badge">${plates.length} word plates</span></div><div><b>Concept fit</b><div class="bar"><span style="width:${concept}%"></span></div>${concept}/100 — phrase is treated as the object, context is secondary.</div><div><b>Street legibility</b><div class="bar"><span style="width:${legibility}%"></span></div>${legibility}/100 — ${read}.</div><div><b>Cut viability</b><div class="bar"><span style="width:${cut}%"></span></div>${cut}/100 — ${cutNote}.</div><div><b>Weak point to inspect visually:</b> if the side chips feel like labels, lower density or remove them; the strongest version should look like the phrase burst into parts, not like a poster with decorations.</div>`}
function download(name,blob){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}function svgText(){return new XMLSerializer().serializeToString(svg)}
function setPreset(type){if(type==='canto'){const i=rows.findIndex(r=>/flor|canto|haiku|flower|tree/i.test([r.artifact,r.spanish,r.english].join(' ')));pick.selectedIndex=Math.max(0,i);phrase.value='FLOR Y CANTO';assembly.value='botanical'}if(type==='depth'){const i=rows.findIndex(r=>/deep|depth|agua|water|river|profundidad/i.test([r.artifact,r.spanish,r.english].join(' ')));pick.selectedIndex=Math.max(0,i);phrase.value='LO PROFUNDO LLAMA';assembly.value='water'}if(type==='dawn'){const i=rows.findIndex(r=>/dawn|sun|sky|luz|amanezca|rigveda/i.test([r.artifact,r.spanish,r.english].join(' ')));pick.selectedIndex=Math.max(0,i);phrase.value='QUE ACLARE QUE AMANEZCA';assembly.value='cosmic'}render()}
function init(){rows.forEach((r,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${r.category} — ${r.artifact}`;pick.appendChild(o)});setPreset('canto');pick.onchange=()=>{const r=rows[pick.selectedIndex];phrase.value=shortPhrase(r);assembly.value='auto';render()};[phrase,assembly,format,explode,seedEl].forEach(el=>el.addEventListener('input',render));document.getElementById('redraw').onclick=()=>{seedEl.value=Number(seedEl.value)+1;render()};document.getElementById('presetCanto').onclick=()=>setPreset('canto');document.getElementById('presetDepth').onclick=()=>setPreset('depth');document.getElementById('presetDawn').onclick=()=>setPreset('dawn');document.getElementById('downloadSvg').onclick=()=>download('thought-worm-disassembled.svg',new Blob([svgText()],{type:'image/svg+xml'}));document.getElementById('downloadPng').onclick=()=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=2000;c.height=2828;const ctx=c.getContext('2d');ctx.fillStyle=PAPER;ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);c.toBlob(b=>download('thought-worm-disassembled.png',b),'image/png')};img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgText())}}
init();
</script>
</body>
</html>
