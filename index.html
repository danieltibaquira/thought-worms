<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thought Worms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#111;--fg:#f4f1ea;--muted:#aaa39a;--line:#3a3936;--accent:#d8c59d;--card:rgba(255,255,255,.035)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 28% 12%,rgba(216,197,157,.08),transparent 28rem),#111;color:var(--fg);font-family:"Source Serif 4","Noto Serif",Georgia,serif;line-height:1.5;padding:1rem;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}main{width:min(1040px,100%)}article{border:1px solid var(--line);border-radius:30px;padding:clamp(1.4rem,5vw,4rem);background:var(--card);box-shadow:0 24px 90px rgba(0,0,0,.32)}.meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2.25rem;color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.82rem;letter-spacing:.02em}.pill{border:1px solid var(--line);border-radius:999px;padding:.35rem .75rem}h1{margin:0 0 .9rem;color:var(--accent);font-size:clamp(1.15rem,2vw,1.65rem);font-weight:500;letter-spacing:.01em}.original{margin:0 0 2.25rem;color:var(--muted);font-family:"Noto Serif","Source Serif 4",Georgia,serif;font-size:clamp(1rem,1.8vw,1.25rem);line-height:1.7}.texts{display:grid;gap:clamp(1.5rem,3vw,2.25rem);margin:2.25rem 0}.block{border-top:1px solid var(--line);padding-top:1.15rem}.label{margin:0 0 .65rem;color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:.14em}.text{margin:0;max-width:18ch;font-size:clamp(2rem,6vw,4.8rem);font-weight:500;line-height:1.08;letter-spacing:-.04em;text-wrap:balance}footer{display:flex;gap:1rem;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:2.25rem;color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.88rem}a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent}a:focus,a:hover{border-bottom-color:currentColor}button{border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:999px;padding:.65rem 1rem;font:inherit;cursor:pointer}button:focus,button:hover{border-color:var(--accent)}@media(min-width:760px){.texts{grid-template-columns:1fr 1fr}}@media(max-width:520px){article{border-radius:22px}.text{max-width:100%;letter-spacing:-.03em}}
</style>
</head>
<body>
<main><article>
<div class="meta"><span class="pill" id="category"></span><span class="pill" id="artifact"></span></div>
<h1 id="title"></h1>
<p class="original" id="original"></p>
<section class="texts"><div class="block"><p class="label">English</p><p class="text" id="english"></p></div><div class="block"><p class="label">Spanish</p><p class="text" id="spanish"></p></div></section>
<footer><a id="source" href="#" target="_blank" rel="noreferrer">Source</a><button id="again" type="button">Another worm</button></footer>
</article></main>
<script src="./thought-worms.js"></script>
<script>
const worms=Array.isArray(window.THOUGHT_WORMS)?window.THOUGHT_WORMS:[];
function pick(){if(!worms.length)return;const w=worms[Math.floor(Math.random()*worms.length)];document.title=w.category+' — Thought Worms';['category','artifact','original','english','spanish'].forEach(k=>document.getElementById(k).textContent=w[k]||'');document.getElementById('title').textContent=w.artifact||'';const s=document.getElementById('source');s.href=w.sourceUrl||'#';s.textContent=w.recommendedEditionSource||'Source'}
document.getElementById('again').addEventListener('click',pick);pick();
</script>
</body>
</html>
