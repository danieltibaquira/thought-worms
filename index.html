<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello, world!</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
    }

    main {
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 10vw, 7rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.06em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, world! 👋</h1>
  </main>
</body>
</html>
