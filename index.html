<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thought Worms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#111;--fg:#f4f1ea;--muted:#aaa39a;--line:#3a3936;--accent:#d8c59d;--card:rgba(255,255,255,.035)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 28% 12%,rgba(216,197,157,.08),transparent 28rem),#111;color:var(--fg);font-family:"Source Serif 4","Noto Serif",Georgia,serif;line-height:1.5;padding:clamp(.75rem,3vw,1.25rem);text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}main{width:min(1040px,100%)}article{border:1px solid var(--line);border-radius:30px;padding:clamp(1.1rem,5vw,4rem);background:var(--card);box-shadow:0 24px 90px rgba(0,0,0,.32)}.meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:clamp(1.2rem,4vw,2.25rem);color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(.76rem,2.8vw,.82rem);letter-spacing:.02em}.pill{border:1px solid var(--line);border-radius:999px;padding:.35rem .75rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}h1{margin:0 0 clamp(1rem,4vw,1.6rem);color:var(--accent);font-size:clamp(1.55rem,8vw,4.8rem);line-height:1.05;font-weight:500;letter-spacing:-.045em;text-wrap:balance}.original{margin:0 0 clamp(1.4rem,4vw,2.25rem);color:var(--muted);font-family:"Noto Serif","Source Serif 4",Georgia,serif;font-size:clamp(.95rem,3.4vw,1.2rem);line-height:1.65}.original[hidden]{display:none}.texts{display:grid;gap:clamp(1.2rem,4vw,2.25rem);margin:clamp(1.4rem,4vw,2.25rem) 0}.block{border-top:1px solid var(--line);padding-top:1rem}.label{margin:0 0 .65rem;color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:.14em}.text{margin:0;max-width:22ch;font-size:clamp(1.45rem,6.8vw,3.7rem);font-weight:500;line-height:1.12;letter-spacing:-.035em;text-wrap:balance}footer{display:flex;gap:1rem;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:clamp(1.3rem,4vw,2.25rem);color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.88rem}a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;overflow-wrap:anywhere}a:focus,a:hover{border-bottom-color:currentColor}button{border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:999px;padding:.65rem 1rem;font:inherit;cursor:pointer}button:focus,button:hover{border-color:var(--accent)}@media(min-width:760px){.texts{grid-template-columns:1fr 1fr}}@media(max-width:520px){body{place-items:stretch center}article{border-radius:22px;min-height:calc(100vh - 1.5rem);display:flex;flex-direction:column;justify-content:center}.meta{display:block}.pill{display:inline-block;max-width:100%;margin:0 0 .5rem}footer{display:grid;gap:.9rem}button{width:100%}.text{max-width:100%;letter-spacing:-.025em}}
</style>
</head>
<body>
<main><article>
<div class="meta"><span class="pill" id="category"></span></div>
<h1 id="artifact"></h1>
<p class="original" id="original"></p>
<section class="texts"><div class="block"><p class="label">English</p><p class="text" id="english"></p></div><div class="block"><p class="label">Spanish</p><p class="text" id="spanish"></p></div></section>
<footer><a id="source" href="#" target="_blank" rel="noreferrer">Source</a><button id="again" type="button">Another worm</button></footer>
</article></main>
<script src="./thought-worms.js"></script>
<script>
const worms=Array.isArray(window.THOUGHT_WORMS)?window.THOUGHT_WORMS:[];
function pick(){if(!worms.length)return;const w=worms[Math.floor(Math.random()*worms.length)];document.title=w.category+' — Thought Worms';document.getElementById('category').textContent=w.category||'';document.getElementById('artifact').textContent=w.artifact||'';document.getElementById('english').textContent=w.english||'';document.getElementById('spanish').textContent=w.spanish||'';const original=document.getElementById('original');const o=(w.original||'').trim();const a=(w.artifact||'').trim();const hideOriginal=!o||o===a||o.endsWith(': non-text artifact');original.hidden=hideOriginal;original.textContent=hideOriginal?'':o;const s=document.getElementById('source');s.href=w.sourceUrl||'#';s.textContent=w.recommendedEditionSource||'Source'}
document.getElementById('again').addEventListener('click',pick);pick();
</script>
</body>
</html>
