<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thought Worms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:dark;--fg:#f4f1ea;--muted:#aaa39a;--line:#3a3936;--accent:#d8c59d;--panel:rgba(255,255,255,.035)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:var(--fg);font-family:"Source Serif 4","Noto Serif",Georgia,serif;padding:clamp(.75rem,3vw,1.25rem)}
    main{width:min(1040px,100%)}
    article{border:1px solid var(--line);border-radius:30px;padding:clamp(1.1rem,5vw,4rem);background:var(--panel)}
    .meta,footer,.label,.controls,.why,.themes,.progress{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--muted)}
    .topbar{display:grid;gap:1rem;margin-bottom:clamp(1rem,4vw,1.6rem)}
    .controls{display:flex;gap:.65rem;flex-wrap:wrap;align-items:center;font-size:.78rem}
    .control{display:flex;gap:.45rem;align-items:center;border:1px solid var(--line);border-radius:999px;padding:.34rem .45rem .34rem .75rem;background:rgba(0,0,0,.12)}
    select{appearance:none;border:0;border-left:1px solid var(--line);background:transparent;color:var(--fg);font:inherit;padding:.2rem 1.4rem .2rem .6rem;outline:0}
    option{background:#111;color:var(--fg)}
    .pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.35rem .75rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    h1{margin:0 0 clamp(1rem,4vw,1.6rem);color:var(--accent);font-size:clamp(1.55rem,8vw,4.8rem);line-height:1.05;font-weight:500;letter-spacing:-.045em;text-wrap:balance}
    .why{margin:.35rem 0 0;font-size:.84rem;line-height:1.5}
    .themes{margin:.35rem 0 0;font-size:.76rem;line-height:1.5;letter-spacing:.02em}
    .original{color:var(--muted);font-family:"Noto Serif","Source Serif 4",Georgia,serif;font-size:clamp(.95rem,3.4vw,1.2rem);line-height:1.65}
    .original[hidden]{display:none}
    .texts{display:grid;gap:clamp(1.2rem,4vw,2.25rem);margin:clamp(1.4rem,4vw,2.25rem) 0}
    .block{border-top:1px solid var(--line);padding-top:1rem}
    .label{margin:0 0 .65rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.14em}
    .text{margin:0;max-width:22ch;font-size:clamp(1.45rem,6.8vw,3.7rem);font-weight:500;line-height:1.12;letter-spacing:-.035em;text-wrap:balance}
    footer{display:flex;gap:1rem;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:1.4rem;font-size:.88rem}
    .footer-left{display:grid;gap:.45rem;min-width:0}
    a{color:var(--accent);text-decoration:none;overflow-wrap:anywhere}
    button{border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:999px;padding:.65rem 1rem;font:inherit;cursor:pointer}
    button:hover,.control:focus-within{border-color:var(--accent)}
    @media(min-width:760px){.texts{grid-template-columns:1fr 1fr}.topbar{grid-template-columns:1fr auto;align-items:start}.controls{justify-content:flex-end}}
    @media(max-width:520px){body{place-items:stretch center}article{border-radius:22px;min-height:calc(100vh - 1.5rem);display:flex;flex-direction:column;justify-content:center}footer{display:grid}button{width:100%}.text{max-width:100%}.control{width:100%;justify-content:space-between}select{max-width:62vw}.controls{display:grid}}
  </style>
</head>
<body>
  <main>
    <article>
      <header class="topbar">
        <div class="meta">
          <span class="pill" id="category"></span>
          <p class="why" id="why"></p>
          <p class="themes" id="themes"></p>
        </div>
        <div class="controls" aria-label="Feed controls">
          <label class="control">Mode
            <select id="mode">
              <option value="balanced">Balanced Daily Drift</option>
              <option value="review">Review</option>
              <option value="long-tail">Long Tail</option>
              <option value="deep-source">Deep Source</option>
              <option value="serendipity">Serendipity</option>
            </select>
          </label>
          <label class="control">Category
            <select id="deepCategory"></select>
          </label>
        </div>
      </header>
      <h1 id="artifact"></h1>
      <p class="original" id="original" hidden></p>
      <section class="texts">
        <div class="block">
          <p class="label">English</p>
          <p class="text" id="english"></p>
        </div>
        <div class="block">
          <p class="label">Spanish</p>
          <p class="text" id="spanish"></p>
        </div>
      </section>
      <footer>
        <div class="footer-left">
          <a id="source" href="#" target="_blank" rel="noreferrer">Source</a>
          <span class="progress" id="progress"></span>
        </div>
        <button id="again" type="button">Another worm</button>
      </footer>
    </article>
  </main>
  <script src="./extra-worms-001.js?v=20260705b"></script>
  <script src="./app.js?v=20260705f"></script>
</body>
</html>
