<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thought Worms</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet"><style>:root{color-scheme:dark;--fg:#f4f1ea;--muted:#aaa39a;--line:#3a3936;--accent:#d8c59d}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:var(--fg);font-family:"Source Serif 4","Noto Serif",Georgia,serif;padding:clamp(.75rem,3vw,1.25rem)}main{width:min(1040px,100%)}article{border:1px solid var(--line);border-radius:30px;padding:clamp(1.1rem,5vw,4rem);background:rgba(255,255,255,.035)}.meta,footer,.label{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--muted)}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.35rem .75rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}h1{margin:clamp(1rem,4vw,1.6rem) 0;color:var(--accent);font-size:clamp(1.55rem,8vw,4.8rem);line-height:1.05;font-weight:500;letter-spacing:-.045em;text-wrap:balance}.original{color:var(--muted);font-family:"Noto Serif","Source Serif 4",Georgia,serif;font-size:clamp(.95rem,3.4vw,1.2rem);line-height:1.65}.original[hidden]{display:none}.texts{display:grid;gap:clamp(1.2rem,4vw,2.25rem);margin:clamp(1.4rem,4vw,2.25rem) 0}.block{border-top:1px solid var(--line);padding-top:1rem}.label{margin:0 0 .65rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.14em}.text{margin:0;max-width:22ch;font-size:clamp(1.45rem,6.8vw,3.7rem);font-weight:500;line-height:1.12;letter-spacing:-.035em;text-wrap:balance}footer{display:flex;gap:1rem;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:1.4rem;font-size:.88rem}a{color:var(--accent);text-decoration:none;overflow-wrap:anywhere}button{border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:999px;padding:.65rem 1rem;font:inherit}@media(min-width:760px){.texts{grid-template-columns:1fr 1fr}}@media(max-width:520px){body{place-items:stretch center}article{border-radius:22px;min-height:calc(100vh - 1.5rem);display:flex;flex-direction:column;justify-content:center}footer{display:grid}button{width:100%}.text{max-width:100%}}</style></head><body><main><article><div class="meta"><span class="pill" id="category"></span></div><h1 id="artifact"></h1><p class="original" id="original" hidden></p><section class="texts"><div class="block"><p class="label">English</p><p class="text" id="english"></p></div><div class="block"><p class="label">Spanish</p><p class="text" id="spanish"></p></div></section><footer><a id="source" href="#" target="_blank" rel="noreferrer">Source</a><button id="again" type="button">Another worm</button></footer></article></main><script src="./extra-worms-001.js?v=20260705b"></script><script src="./app.js?v=20260705e"></script></body></html>
