<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thought Worms — Objeto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:dark;--bg:#111;--fg:#f4f1ea;--muted:#8b857a;--line:#35332f;--accent:#d8c59d;--panel:#171715;--soft:rgba(244,241,234,.13);--scale:1}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:clamp(.7rem,2vw,1.25rem);display:grid;place-items:center}.shell{position:relative;width:min(1060px,100%);min-height:calc(100vh - clamp(1.4rem,4vw,2.5rem));border:1px solid var(--line);border-radius:clamp(22px,4vw,38px);overflow:hidden;background:radial-gradient(circle at 50% 28%,rgba(216,197,157,.07),transparent 35%),linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.015));display:grid;place-items:center;padding:clamp(1rem,5vw,4.8rem)}
    .blueprint{position:absolute;inset:0;width:100%;height:100%;color:var(--fg);opacity:.58;pointer-events:none}.core{position:relative;z-index:2;width:min(840px,100%);display:grid;place-items:center;gap:clamp(1rem,3vw,1.6rem);text-align:center}.phrase{margin:0;font-family:"Source Serif 4","Noto Serif",Georgia,serif;color:var(--accent);font-weight:680;letter-spacing:-.055em;line-height:.98;font-size:clamp(2rem,calc(8.6vw * var(--scale)),6.6rem);max-width:13ch;text-wrap:balance}.parts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.5rem;width:min(520px,100%);opacity:.86}.part{border:1px solid rgba(244,241,234,.18);border-radius:999px;padding:.46rem .7rem;color:rgba(244,241,234,.62);font-size:.78rem;letter-spacing:.11em;text-transform:uppercase;background:rgba(0,0,0,.12)}.actions{position:absolute;z-index:3;left:clamp(1rem,3vw,2rem);right:clamp(1rem,3vw,2rem);bottom:clamp(1rem,3vw,2rem);display:flex;justify-content:space-between;align-items:center;gap:1rem}.nav{display:flex;gap:.8rem}.nav a{color:rgba(216,197,157,.42);text-decoration:none;font-size:.8rem}button{border:1px solid rgba(244,241,234,.18);background:rgba(0,0,0,.12);color:rgba(244,241,234,.82);border-radius:999px;padding:.64rem 1.05rem;font:inherit;cursor:pointer}button:hover,.nav a:hover{color:var(--accent);border-color:var(--accent)}body[data-size="short"]{--scale:1.06}body[data-size="mid"]{--scale:.84}body[data-size="long"]{--scale:.63}body[data-size="long"] .phrase{max-width:18ch}body[data-size="long"] .parts{grid-template-columns:1fr;max-width:420px}.quiet-origin{position:absolute;right:clamp(1rem,3vw,2rem);top:clamp(1rem,3vw,2rem);z-index:3;color:rgba(216,197,157,.28);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none}
    @media(max-width:660px){body{padding:.55rem}.shell{min-height:calc(100vh - 1.1rem);padding:1.2rem;border-radius:24px}.phrase{font-size:clamp(1.95rem,12vw,4.35rem);max-width:11.5ch}.parts{grid-template-columns:1fr 1fr;gap:.4rem;width:100%}.part{font-size:.66rem;padding:.38rem .48rem}.actions{position:static;width:100%;margin-top:1.4rem}.nav{display:none}.blueprint{opacity:.36}body[data-size="long"] .phrase{font-size:clamp(1.3rem,8.4vw,3.2rem);max-width:17ch}body[data-size="long"] .parts{display:none}.quiet-origin{display:none}}
  </style>
</head>
<body>
  <main class="shell" id="shell">
    <svg id="blueprint" class="blueprint" viewBox="0 0 1000 1400" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>
    <a id="origin" class="quiet-origin" target="_blank" rel="noreferrer">origen</a>
    <section class="core"><h1 id="phrase" class="phrase"></h1><div id="parts" class="parts"></div></section>
    <div class="actions"><nav class="nav"><a href="./">/</a><a href="./artifacts.html">tabla</a></nav><button id="next">otro</button></div>
  </main>
  <script src="./extra-worms-001.js?v=20260705b"></script>
  <script src="./extra-worms-002.js?v=20260706a"></script>
  <script>
    const rows=(Array.isArray(window.THOUGHT_WORMS)?window.THOUGHT_WORMS:[]).filter(r=>r&&r.spanish);
    const svg=document.getElementById('blueprint'), phrase=document.getElementById('phrase'), parts=document.getElementById('parts'), origin=document.getElementById('origin');
    const NS='http://www.w3.org/2000/svg'; let cursor=Math.floor(Math.random()*Math.max(1,rows.length));
    const stop=new Set('a al algo ante antes como con contra de del desde donde el ella en entre era es esa ese eso esta este esto la las lo los mas más me mi muy no o para pero por que se si sin su sus te tu un una y ya'.split(' '));
    function e(n,a={}){const x=document.createElementNS(NS,n);for(const[k,v]of Object.entries(a))x.setAttribute(k,v);svg.appendChild(x);return x}
    function line(x1,y1,x2,y2,w=3,d='',o=.65){e('line',{x1,y1,x2,y2,stroke:'currentColor','stroke-width':w,'stroke-linecap':'round','stroke-dasharray':d,opacity:o})}
    function rect(x,y,w,h,o=.5){e('rect',{x,y,width:w,height:h,rx:Math.min(w,h)*.18,fill:'currentColor',opacity:o})}
    function circle(cx,cy,r,o=.55,fill='none'){e('circle',{cx,cy,r,fill,stroke:'currentColor','stroke-width':4,opacity:o})}
    function path(d,w=4,o=.58){e('path',{d,fill:'none',stroke:'currentColor','stroke-width':w,'stroke-linecap':'round','stroke-linejoin':'round',opacity:o})}
    function polygon(points,o=.52){e('polygon',{points:points.map(p=>p.join(',')).join(' '),fill:'currentColor',opacity:o})}
    function theme(r){const t=[r.category,r.artifact,r.original,r.english,r.spanish].join(' ').toLowerCase();if(/agua|río|rio|mar|profund|water|river|sea|depth/.test(t))return'water';if(/flor|árbol|arbol|raíz|raiz|canto|haiku|flower|tree|root|pond|frog/.test(t))return'botanical';if(/luz|cielo|fuego|sol|estrella|amane|sun|sky|fire|star|dawn|rigveda/.test(t))return'cosmic';if(/silencio|quiet|still|mente|atención|attention|cell/.test(t))return'silence';if(/muerte|días|dias|tiempo|death|grave|jisei/.test(t))return'time';return'urban'}
    function size(t){return t.length<75?'short':t.length>165?'long':'mid'}
    function semanticWords(text){const clean=String(text).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zñ\s]/g,' ');const all=clean.split(/\s+/).filter(w=>w.length>3&&!stop.has(w));const unique=[...new Set(all)];return unique.sort((a,b)=>b.length-a.length).slice(0,4)}
    function frame(){rect(64,74,118,10,.44);rect(64,74,10,118,.44);rect(818,74,118,10,.44);rect(926,74,10,118,.44);rect(64,1208,10,118,.44);rect(64,1316,118,10,.44);rect(818,1316,118,10,.44);rect(926,1208,10,118,.44);circle(500,1240,30,.33);line(220,1240,420,1240,3,'42 26',.4);line(580,1240,780,1240,3,'42 26',.4)}
    function glyph(k){if(k==='water'){for(let i=0;i<4;i++)path(`M${250+i*125} 208 C${305+i*125} 158 ${350+i*125} 258 ${410+i*125} 208`,5,.46);circle(500,210,86,.26)}else if(k==='botanical'){for(let i=0;i<6;i++){const a=i*Math.PI/3;e('ellipse',{cx:500+Math.cos(a)*48,cy:212+Math.sin(a)*34,rx:23,ry:70,fill:'currentColor',opacity:.36,transform:`rotate(${a*180/Math.PI+90} ${500+Math.cos(a)*48} ${212+Math.sin(a)*34})`})}circle(500,212,22,.32)}else if(k==='cosmic'){e('path',{d:'M392 245 A108 108 0 0 1 608 245 L392 245',fill:'currentColor',opacity:.34});for(let i=0;i<11;i++){const a=-Math.PI+i*Math.PI/10;line(500+132*Math.cos(a),245+132*Math.sin(a),500+205*Math.cos(a),245+205*Math.sin(a),5,'',.38)}}else if(k==='silence'){rect(408,132,184,132,.34);e('rect',{x:442,y:164,width:116,height:68,rx:10,fill:'#111',opacity:1});line(500,164,500,232,4,'',.38);circle(500,306,18,.3)}else if(k==='time'){circle(500,216,90,.32);e('path',{d:'M450 165 A70 70 0 1 0 450 255 A48 48 0 1 1 450 165',fill:'currentColor',opacity:.34})}else{polygon([[225,270],[350,150],[455,245],[600,135],[785,270]],.28);for(let i=0;i<14;i++)rect(280+i*31,222-(i%3)*20,18,68+(i%4)*14,.42)}}
    function base(k){if(k==='water')path('M180 1110 C310 1030 405 1190 500 1110 C610 1020 705 1190 820 1110',6,.28);else if(k==='botanical'){line(500,1008,500,1182,5,'18 18',.3);for(let i=0;i<5;i++)e('ellipse',{cx:410+i*45,cy:1110-(i%2)*38,rx:17,ry:50,fill:'currentColor',opacity:.22,transform:`rotate(${i%2?42:-42} ${410+i*45} ${1110-(i%2)*38})`})}else{polygon([[210,1160],[350,1040],[460,1135],[615,1030],[805,1160]],.25);for(let i=0;i<15;i++)e('rect',{x:270+i*30,y:1115-(i%5)*15,width:17,height:60+(i%4)*12,fill:'#111',opacity:.9})}e('path',{d:'M220 1198 Q500 1275 780 1198',fill:'none',stroke:'#d8c59d','stroke-width':10,'stroke-linecap':'round','stroke-dasharray':'70 28',opacity:.58})}
    function partAssembly(words){parts.innerHTML='';words.forEach(w=>{const s=document.createElement('span');s.className='part';s.textContent=w;parts.appendChild(s)})}
    function render(row){const text=row?.spanish||'Respira.';document.body.dataset.size=size(text);phrase.textContent=text;origin.href=row?.url||row?.sourceUrl||'#';partAssembly(semanticWords(text));svg.innerHTML='';const k=theme(row||{});frame();glyph(k);base(k)}
    function next(){cursor=(cursor+1)%rows.length;render(rows[cursor])}
    document.getElementById('next').addEventListener('click',next);render(rows[cursor]||{spanish:'Respira.'});
  </script>
</body>
</html>
