<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thought Worms â€” Objeto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:dark;--bg:#111;--paper:#161615;--fg:#f4f1ea;--muted:#807a70;--line:#3a3936;--accent:#d8c59d;--ghost:rgba(244,241,234,.18);--scale:1}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:clamp(.75rem,2.5vw,1.35rem);display:grid;place-items:center}.wrap{width:min(1080px,100%);min-height:calc(100vh - 2.7rem);display:grid;place-items:center}.object{position:relative;isolation:isolate;width:100%;min-height:min(880px,calc(100vh - 2.7rem));border:1px solid var(--line);border-radius:clamp(22px,4vw,36px);overflow:hidden;background:radial-gradient(circle at 50% 32%,rgba(216,197,157,.08),transparent 34%),linear-gradient(140deg,rgba(255,255,255,.045),rgba(255,255,255,.015));display:grid;place-items:center;padding:clamp(1rem,4vw,4.2rem)}
    svg{position:absolute;inset:0;width:100%;height:100%;z-index:-1;color:var(--fg);opacity:.82}.core{width:min(850px,100%);display:grid;place-items:center;gap:clamp(1rem,3vw,1.7rem);padding:clamp(1rem,3vw,2.4rem);text-align:center}.phrase{font-family:"Source Serif 4","Noto Serif",Georgia,serif;margin:0;color:var(--accent);font-size:clamp(2rem,calc(9.2vw * var(--scale)),7rem);font-weight:680;letter-spacing:-.058em;line-height:.96;text-wrap:balance;max-width:12.5ch}.source{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,241,234,.34);text-decoration:none}.source:focus,.source:hover{color:var(--accent)}.actions{position:absolute;left:clamp(1rem,3vw,2rem);right:clamp(1rem,3vw,2rem);bottom:clamp(1rem,3vw,2rem);display:flex;align-items:center;justify-content:space-between;gap:1rem;z-index:2}.nav{display:flex;gap:.8rem;align-items:center}.nav a{color:rgba(216,197,157,.48);font-size:.8rem;text-decoration:none}.nav a:hover{color:var(--accent)}button{border:1px solid rgba(244,241,234,.18);background:rgba(0,0,0,.12);color:rgba(244,241,234,.82);border-radius:999px;padding:.62rem 1rem;font:inherit;cursor:pointer}button:hover{border-color:var(--accent);color:var(--fg)}body[data-size="long"]{--scale:.66}body[data-size="mid"]{--scale:.82}body[data-size="short"]{--scale:1.04}body[data-size="long"] .phrase{max-width:18ch}body[data-size="short"] .phrase{max-width:9.5ch}@media(max-width:680px){.object{min-height:calc(100vh - 1.5rem);padding:1.1rem}.core{padding:1rem}.phrase{font-size:clamp(2.05rem,13vw,4.8rem);max-width:11ch}.actions{position:static;margin-top:1.5rem}.wrap{min-height:auto}.nav{display:none}svg{opacity:.55}body[data-size="long"] .phrase{font-size:clamp(1.35rem,8.8vw,3.2rem);max-width:17ch}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="object" id="object">
      <svg id="diagram" viewBox="0 0 1000 1400" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>
      <article class="core"><p class="phrase" id="phrase"></p><a class="source" id="source" target="_blank" rel="noreferrer">origen</a></article>
      <div class="actions"><nav class="nav"><a href="./">/</a><a href="./artifacts.html">tabla</a></nav><button id="next" type="button">otro</button></div>
    </section>
  </main>
  <script src="./extra-worms-001.js?v=20260705b"></script>
  <script src="./extra-worms-002.js?v=20260706a"></script>
  <script>
    const rows=(Array.isArray(window.THOUGHT_WORMS)?window.THOUGHT_WORMS:[]).filter(r=>r&&r.spanish);
    const NS='http://www.w3.org/2000/svg', svg=document.getElementById('diagram'), phrase=document.getElementById('phrase'), source=document.getElementById('source');
    let cursor=Math.floor(Math.random()*Math.max(1,rows.length));
    function node(n,a={}){const e=document.createElementNS(NS,n);for(const [k,v] of Object.entries(a))e.setAttribute(k,v);svg.appendChild(e);return e}
    function line(x1,y1,x2,y2,w=3,d=''){node('line',{x1,y1,x2,y2,stroke:'currentColor','stroke-width':w,'stroke-linecap':'round','stroke-dasharray':d,opacity:.65})}
    function rect(x,y,w,h,o=.5){node('rect',{x,y,width:w,height:h,rx:Math.min(w,h)*.16,fill:'currentColor',opacity:o})}
    function circle(cx,cy,r,o=.55,fill='none'){node('circle',{cx,cy,r,fill,stroke:'currentColor','stroke-width':4,opacity:o})}
    function path(d,w=4,o=.58){node('path',{d,fill:'none',stroke:'currentColor','stroke-width':w,'stroke-linecap':'round','stroke-linejoin':'round',opacity:o})}
    function poly(points,o=.52){node('polygon',{points:points.map(p=>p.join(',')).join(' '),fill:'currentColor',opacity:o})}
    function theme(row){const t=[row.category,row.artifact,row.original,row.english,row.spanish].join(' ').toLowerCase();if(/agua|rĂ­o|rio|mar|profund|water|river|sea|depth/.test(t))return 'water';if(/flor|Ăˇrbol|arbol|raĂ­z|raiz|canto|haiku|flower|tree|root|pond|frog/.test(t))return 'botanical';if(/luz|cielo|fuego|sol|estrella|amane|sun|sky|fire|star|dawn|rigveda/.test(t))return 'cosmic';if(/silencio|quiet|still|mente|atenciĂłn|attention|cell/.test(t))return 'silence';if(/muerte|dĂ­as|dias|tiempo|death|grave|jisei/.test(t))return 'time';return 'urban'}
    function size(text){const n=text.length;if(n<80)return 'short';if(n>170)return 'long';return 'mid'}
    function frame(){rect(64,74,120,10,.55);rect(64,74,10,120,.55);rect(816,74,120,10,.55);rect(926,74,10,120,.55);rect(64,1206,10,120,.55);rect(64,1316,120,10,.55);rect(816,1316,120,10,.55);rect(926,1206,10,120,.55);circle(500,1230,32,.44);line(220,1230,420,1230,3,'34 22');line(580,1230,780,1230,3,'34 22')}
    function connectors(){[[235,320,405,520],[765,320,595,520],[235,1030,405,850],[765,1030,595,850],[500,260,500,430],[500,1120,500,920]].forEach(p=>line(...p,2,'8 16'))}
    function glyph(kind){if(kind==='botanical'){for(let i=0;i<6;i++){const a=i*Math.PI/3;node('ellipse',{cx:500+Math.cos(a)*48,cy:210+Math.sin(a)*34,rx:24,ry:72,fill:'currentColor',opacity:.56,transform:`rotate(${a*180/Math.PI+90} ${500+Math.cos(a)*48} ${210+Math.sin(a)*34})`})}circle(500,210,22,.5)}else if(kind==='water'){for(let i=0;i<4;i++)path(`M${245+i*130} 210 C${300+i*130} 160 ${350+i*130} 260 ${410+i*130} 210`,5,.6);circle(500,210,88,.38)}else if(kind==='cosmic'){node('path',{d:'M390 245 A110 110 0 0 1 610 245 L390 245',fill:'currentColor',opacity:.5});for(let i=0;i<11;i++){const a=-Math.PI+i*Math.PI/10;line(500+135*Math.cos(a),245+135*Math.sin(a),500+215*Math.cos(a),245+215*Math.sin(a),5)}}else if(kind==='silence'){rect(405,130,190,140,.55);node('rect',{x:438,y:164,width:124,height:74,rx:10,fill:'#111',opacity:1});line(500,164,500,238,4);circle(500,310,20,.48)}else if(kind==='time'){circle(500,210,92,.46);node('path',{d:'M450 165 A70 70 0 1 0 450 255 A48 48 0 1 1 450 165',fill:'currentColor',opacity:.5});line(430,315,570,315,4,'22 18')}else{poly([[220,270],[350,150],[455,245],[600,135],[790,270]],.5);for(let i=0;i<14;i++)rect(278+i*31,220-(i%3)*22,18,70+(i%4)*14,.9)}}
    function base(kind){if(kind==='water')path('M180 1110 C310 1030 405 1190 500 1110 C610 1020 705 1190 820 1110',6,.45);else if(kind==='botanical'){line(500,995,500,1190,5,'18 18');for(let i=0;i<5;i++)node('ellipse',{cx:410+i*45,cy:1110-(i%2)*38,rx:18,ry:54,fill:'currentColor',opacity:.38,transform:`rotate(${i%2?42:-42} ${410+i*45} ${1110-(i%2)*38})`})}else{poly([[210,1160],[350,1040],[460,1135],[615,1030],[805,1160]],.42);for(let i=0;i<15;i++)node('rect',{x:270+i*30,y:1115-(i%5)*15,width:17,height:60+(i%4)*12,fill:'#111',opacity:1})}node('path',{d:'M220 1198 Q500 1275 780 1198',fill:'none',stroke:'#d8c59d','stroke-width':11,'stroke-linecap':'round','stroke-dasharray':'70 28',opacity:.82})}
    function render(row){const text=row?.spanish||'Respira.';document.body.dataset.size=size(text);phrase.textContent=text;source.href=row?.url||row?.sourceUrl||'#';source.textContent='origen';svg.innerHTML='';const k=theme(row||{});frame();glyph(k);connectors();base(k)}
    function next(){cursor=(cursor+1)%rows.length;render(rows[cursor])}
    document.getElementById('next').addEventListener('click',next);render(rows[cursor]||{spanish:'Respira.'});
  </script>
</body>
</html>
