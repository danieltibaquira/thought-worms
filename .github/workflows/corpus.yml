name: Corpus Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate corpus
        run: npm test

      - name: Generate corpus report
        run: node scripts/review-report.mjs | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload corpus report
        uses: actions/upload-artifact@v4
        with:
          name: corpus-report
          path: corpus-report.md
