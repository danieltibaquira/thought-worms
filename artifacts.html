<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thought Worms — Artifacts</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet"><style>:root{color-scheme:dark;--fg:#f4f1ea;--muted:#aaa39a;--line:#3a3936;--accent:#d8c59d;--bg:#111}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Source Serif 4","Noto Serif",Georgia,serif;padding:clamp(1rem,3vw,2rem)}main{max-width:1500px;margin:0 auto}header{display:grid;gap:1rem;margin-bottom:1.25rem}h1{margin:0;color:var(--accent);font-size:clamp(2rem,6vw,5rem);line-height:.95;letter-spacing:-.05em;font-weight:500}.nav{display:flex;gap:1rem;flex-wrap:wrap;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.nav a{color:var(--accent);text-decoration:none}.controls{display:grid;grid-template-columns:1fr;gap:.75rem;margin:1.25rem 0}.controls input,.controls select{width:100%;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.035);color:var(--fg);padding:.75rem 1rem;font:inherit}.count{color:var(--muted);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.9rem}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.025)}table{width:100%;border-collapse:collapse;min-width:1100px}th,td{padding:.9rem 1rem;border-bottom:1px solid var(--line);vertical-align:top}th{position:sticky;top:0;background:#151515;color:var(--accent);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;text-align:left;cursor:pointer}td{font-size:1rem;line-height:1.45}.category{white-space:nowrap;color:var(--accent)}.artifact{font-weight:600}.original{font-family:"Noto Serif","Source Serif 4",Georgia,serif;color:var(--muted)}a{color:var(--accent)}tr:hover td{background:rgba(216,197,157,.04)}@media(min-width:800px){.controls{grid-template-columns:1.4fr .7fr auto;align-items:center}}@media(max-width:640px){body{padding:.75rem}.table-wrap{border-radius:14px}th,td{padding:.75rem}.nav{font-size:.9rem}}</style></head><body><main><header><div class="nav"><a href="./">Random worm</a><a href="./artifacts.html">Artifact table</a></div><h1>Artifacts</h1><div class="controls"><input id="search" type="search" placeholder="Search category, artifact, original, English, Spanish…"><select id="category"><option value="">All categories</option></select><div class="count" id="count"></div></div></header><div class="table-wrap"><table><thead><tr><th data-key="category">Category</th><th data-key="artifact">Artifact</th><th data-key="original">Original</th><th data-key="english">English</th><th data-key="spanish">Spanish</th><th data-key="recommendedEditionSource">Source</th><th data-key="notes">Notes</th></tr></thead><tbody id="tbody"></tbody></table></div></main><script src="./extra-worms-001.js?v=20260705b"></script><script>const rows=Array.isArray(window.THOUGHT_WORMS)?window.THOUGHT_WORMS:[];let sortKey='category',sortDir=1;const search=document.getElementById('search'),category=document.getElementById('category'),tbody=document.getElementById('tbody'),count=document.getElementById('count');function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function init(){[...new Set(rows.map(r=>r.category))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;category.appendChild(o)});document.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.key;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1}render()}));search.addEventListener('input',render);category.addEventListener('change',render);render()}function filtered(){const q=search.value.trim().toLowerCase();return rows.filter(r=>(!category.value||r.category===category.value)&&(!q||['category','artifact','original','english','spanish','recommendedEditionSource','notes'].some(k=>String(r[k]||'').toLowerCase().includes(q)))).sort((a,b)=>String(a[sortKey]||'').localeCompare(String(b[sortKey]||''))*sortDir)}function render(){const data=filtered();count.textContent=`${data.length} / ${rows.length} artifacts`;tbody.innerHTML=data.map(r=>`<tr><td class="category">${esc(r.category)}</td><td class="artifact">${esc(r.artifact)}</td><td class="original">${esc(r.original)}</td><td>${esc(r.english)}</td><td>${esc(r.spanish)}</td><td><a href="${esc(r.sourceUrl)}" target="_blank" rel="noreferrer">${esc(r.recommendedEditionSource)}</a></td><td>${esc(r.notes)}</td></tr>`).join('')}init();</script></body></html>
